<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>ZYPHER</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Favicon logo -->
<link rel="icon" type="image/png" href="/static/LOGO-1.png">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--green);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: center; /* centraliza conteúdo */
  height: 70px; /* altura fixa para padronizar */
}

.header-center img {
  height: 145px;      /* aumenta a altura */
  width: auto;       /* mantém proporção */
  max-width: 260px;  /* evita quebrar */
  display: block;
  margin: 0 auto;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* efeito hover */
.header-center img:hover {
  transform: scale(1.05); /* cresce levemente */
  opacity: 0.9;           /* dá um efeito de suavização */
}

  :root{
    --green:#2e7d32;
    --green-600:#256c29;
    --bg:#f6f7fb;
    --card:#ffffff;
    --text:#1b1f24;
    --muted:#5f6b7a;
    --red:#d93025;
    --amber:#b7791f;
    --ring:rgba(0,0,0,.06);
  }
  .dark{
    --bg:#0f1419;
    --card:#131a21;
    --text:#e8eef5;
    --muted:#9fb1c7;
    --ring:rgba(255,255,255,.04);
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text)}
  header{position:sticky; top:0; z-index:20; background:var(--green); color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:center}
  header .title{font-weight:800; letter-spacing:.5px}
  .top-actions{position:absolute; right:16px; top:10px; display:flex; gap:10px; align-items:center}
  .iconbtn{width:38px; height:38px; border-radius:10px; display:grid; place-items:center; background:rgba(255,255,255,.15); cursor:pointer; border:1px solid rgba(255,255,255,.18)}
  .iconbtn:hover{background:rgba(255,255,255,.25)}
  .iconbtn svg{width:18px; height:18px; fill:#fff}
  main{padding:16px; max-width:1480px; margin:0 auto}
  .kpis{display:flex; gap:12px; justify-content:center; margin-bottom:10px}
  .kpi{min-width:110px; background:var(--card); border-radius:14px; padding:16px; text-align:center; box-shadow:0 6px 16px var(--ring); border:1px solid var(--ring)}
  .kpi .n{font-size:26px; font-weight:800}
  .kpi .lbl{font-size:12px; color:var(--muted)}
  .toolbar{display:flex; gap:10px; align-items:center; justify-content:center; margin:10px auto 18px; max-width:900px}
  .search{flex:1; background:var(--card); border:1px solid var(--ring); border-radius:12px; padding:10px 12px; outline:none; color:var(--text)}
  .btn{border:none; background:var(--card); color:var(--text); border:1px solid var(--ring); padding:10px 14px; border-radius:12px; cursor:pointer}
  .btn.active{background:var(--green); color:#fff; border-color:var(--green)}
  .btn.active-offline{background:var(--red); color:#fff; border-color:var(--red)}
  .btn.active-online{background:var(--green); color:#fff; border-color:var(--green)}
  .grid-wrapper{position:relative}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px; padding-bottom:30px}
  .card{background:var(--card); border:1px solid var(--ring); border-radius:16px; padding:16px; box-shadow:0 6px 16px var(--ring); position:relative; text-align:center}
  .zebra{width:58px; margin:6px auto 12px; opacity:.98}
  .status{font-weight:700; font-size:13px; margin-bottom:6px}
  .status .on{color:var(--green)}
  .status .off{color:var(--red)}
  .name{font-weight:800; text-align:center; line-height:1.2; margin:4px 0 6px; cursor:pointer}
  .aviso{font-size:13px; text-align:center; margin-top:8px; font-weight:700}
  .muted{color:var(--muted)}
  /* sidebar */
  .sidebar-toggle{position:fixed; left:10px; top:10px; z-index:70}
  .sidebar{
    position:fixed; left:10px; top:10px; bottom:10px; width:240px; background:var(--green); color:#fff;
    border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.25); transform:translateX(-270px); transition:.25s ease; padding:12px; z-index:60
  }
  .sidebar.show{transform:none}
  .side-head{display:flex; justify-content:space-between; align-items:center; padding:6px 8px 10px; border-bottom:1px solid rgba(255,255,255,.15)}
  .side-title{font-weight:800}
  .side-btn{width:100%; text-align:left; padding:10px 12px; margin:10px 0; background:rgba(255,255,255,.06); border-radius:12px; color:#fff; cursor:pointer; border:1px solid rgba(255,255,255,.08)}
  .side-btn.inline{display:flex; align-items:center; gap:10px}
  .side-list{display:none; margin-top:8px}
  .side-list.show{display:block}
  .side-item{width:100%; padding:10px 12px; border-radius:10px; background:rgba(0,0,0,.12); border:1px solid rgba(255,255,255,.08); color:#fff; margin:6px 0; cursor:pointer}
  .side-item:hover{background:rgba(0,0,0,.18)}
  .side-foot{position:absolute; bottom:12px; left:12px; right:12px; display:grid; gap:8px}
  /* dropdown user */
  .dropdown{position:absolute; display:none; background:var(--card); color:var(--text); border:1px solid var(--ring); border-radius:12px; padding:8px; min-width:220px; box-shadow:0 10px 20px rgba(0,0,0,.25)}
  .dropdown.show{display:block}
  .drop-item{padding:8px 10px; border-radius:10px}
  .drop-item.link{cursor:pointer}
  .drop-item.link:hover{background:rgba(0,0,0,.06)}
  /* modal */
  .modal-back{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center}
  .modal{background:var(--card); color:var(--text); border-radius:16px; width:min(560px,92vw); border:1px solid var(--ring); box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .modal .hd{padding:14px 16px; border-bottom:1px solid var(--ring); font-weight:800; color:var(--green)}
  .modal .bd{padding:14px 16px; max-height:60vh; overflow:auto}
  .modal .ft{padding:12px 16px; display:flex; gap:8px; justify-content:flex-end; border-top:1px solid var(--ring)}
  .btn-green{background:var(--green); color:#fff; border-color:var(--green)}
  .btn-red{background:var(--red); color:#fff; border-color:var(--red)}
  .btn-ghost{background:transparent}
  /* small loading on grid */
  .grid-loading{
    position:absolute; inset:0; display:none; place-items:center; background:rgba(255,255,255,.85); z-index:55; border-radius:12px;
  }
  .grid-loading .inner{display:grid; gap:10px; justify-items:center}
  .grid-loading .msg{font-weight:700}
  .dark .grid-loading{background:rgba(0,0,0,.6)}
  .spinner svg{width:64px; height:64px; animation:spin 1.1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  footer{padding:14px 10px;text-align:center;font-size:13px;color:var(--muted)}
  .small{font-size:12px}

  /* melhorias dark mode pedidas (#8) */
  .dark .modal{border:1px solid var(--green)}
  .dark .search{border:1px solid var(--green)}

  /* Logo de fundo no sidebar */
.sidebar::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 180px;      /* tamanho da logo */
  height: 180px;     /* tamanho da logo */
  background: url("/static/LOGO-2.png") no-repeat center;
  background-size: contain;
  opacity: 0.15;     /* transparência */
  pointer-events: none; /* não atrapalha cliques */
}

</style>
</head>

<script>
  // impressoras injetadas pelo Flask
  const impressoras = JSON.parse('{{ impressoras|tojson|safe }}' || '[]');
  const socket = io();
  const grid = document.getElementById('grid');
  const gridLoading = document.getElementById('gridLoading');
  const gridMsg = document.getElementById('gridMsg');
  const kpiTotal = document.getElementById('kpiTotal');
  const kpiOn = document.getElementById('kpiOn');
  const kpiOff = document.getElementById('kpiOff');
  const tsElem = document.getElementById('ts');
  const search = document.getElementById('search');
  const toolbarBtns = [...document.querySelectorAll('.toolbar .btn')];

  const openSidebarBtn = document.getElementById('openSidebar');
  const sidebar = document.getElementById('sidebar');

  let statusAtual = {}; // {nome: {status,aviso}}
  let filtro = 'all';
  let blocoFiltro = '*';
  let alertaFiltro = false;

  function iconSrc(){
    return document.documentElement.classList.contains('dark')
      ? '/static/animal_branco.png'
      : '/static/animal_13157685.png';
  }

  // helpers loading msgs (animações pedidas #6 #7)
  function showLoading(msg=''){
    if(!gridLoading) return;
    gridMsg.textContent = msg || '';
    gridLoading.style.display = 'grid';
  }
  function hideLoading(){
    if(!gridLoading) return;
    gridMsg.textContent = '';
    gridLoading.style.display = 'none';
  }

  // render grid cards and attach click-on-name handler
  function renderGrid(){
    grid.innerHTML = '';
    for(const p of impressoras){
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-nome', p.nome);
      card.setAttribute('data-bloco', (p.bloco||'').toString().trim());
      card.innerHTML = `
        <img class="zebra" src="${iconSrc()}" alt="Zebra">
        <div class="status"><span class="small">Status:</span> <span class="onoff">${ (statusAtual[p.nome] ? statusAtual[p.nome].status : '...') }</span></div>
        <div class="name">${p.nome}</div>
        <div class="aviso small">${ (statusAtual[p.nome] ? statusAtual[p.nome].aviso : '') }</div>
        <div class="contador small">Contador:<b class="contador-val"> ${(statusAtual[p.nome] ? statusAtual[p.nome].contador || '--' : '--')}</b></div>
        <div class="muted small">${p.ip || ''}</div>
      `;
      grid.appendChild(card);

      // click on name opens history
      const nameEl = card.querySelector('.name');
      nameEl.style.cursor = 'pointer';
      nameEl.addEventListener('click', ()=> abrirHistorico(p.nome) );
    }
    applyFilters();
  }

  // update KPIs colors and values
  function updateKpis(){
    const total = impressoras.length;
    let on = 0, off = 0;
    for(const n in statusAtual){
      if(statusAtual[n].status === 'Online') on++; else off++;
    }
    kpiTotal.textContent = total;
    kpiOn.textContent = on;
    kpiOff.textContent = off;
    // coloring
    kpiOn.style.color = on > 0 ? 'var(--green)' : 'var(--muted)';
    kpiOff.style.color = off > 0 ? 'var(--red)' : 'var(--muted)';
  }

  // apply filters (busca + online/offline + bloco + alertas)
  function applyFilters(){
    const q = search.value.toLowerCase().trim();
    const whitelistAlertas = new Set(['AVISO FITA INSTAL.', 'WARNING RIBBON IN']);
    document.querySelectorAll('.card').forEach(c=>{
      const nome = (c.dataset.nome || '');
      const nomeLower = nome.toLowerCase();
      const bloco = (c.dataset.bloco || '').toString().trim();
      const st = (statusAtual[nome] || {}).status || '';
      const aviso = ((statusAtual[nome] || {}).aviso || '').toUpperCase();

      let ok = true;
      if(q && !nomeLower.includes(q)) ok = false;
      if(filtro === 'online' && st !== 'Online') ok = false;
      if(filtro === 'offline' && st !== 'Offline') ok = false;
      if(blocoFiltro !== '*' && bloco !== blocoFiltro) ok = false;
      if(alertaFiltro && !whitelistAlertas.has(aviso)) ok = false;

      c.style.display = ok ? '' : 'none';
    });
  }

  // toolbar buttons behavior (with color states)
  toolbarBtns.forEach(b=>{
    b.addEventListener('click', ()=>{
      toolbarBtns.forEach(x => { x.classList.remove('active','active-offline','active-online'); });
      const f = b.dataset.filter;
      filtro = f;
      if(f === 'offline') b.classList.add('active-offline');
      else if(f === 'online') b.classList.add('active-online');
      else b.classList.add('active');
      applyFilters();
    });
  });
  search.addEventListener('input', applyFilters);

  // HISTORICO modal
  const histBack = document.getElementById('histBack');
  const histBody = document.getElementById('histBody');
  const closeHistBtn = document.getElementById('closeHist');
  const btnDLHist = document.getElementById('btnDLHist');
  let histTarget = null;

  async function abrirHistorico(name){
    histTarget = name;
    histBody.innerHTML = '<div class="small">Carregando histórico...</div>';
    histBack.style.display = 'flex';
    try{
      const r = await fetch('/historico/' + encodeURIComponent(name));
      if(!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if(!data || data.length === 0){
        histBody.innerHTML = '<div class="small">Sem registros.</div>';
      }else{
        const items = data.slice().reverse().map(i => `<li><b>${i.hora}</b> - ${i.status} (${i.aviso})</li>`).join('');
        histBody.innerHTML = `<ul class="small">${items}</ul>`;
      }
    }catch(e){
      histBody.innerHTML = '<div class="small">Erro ao carregar histórico.</div>';
      console.error(e);
    }
  }
  closeHistBtn.addEventListener('click', ()=> histBack.style.display = 'none');
  btnDLHist.addEventListener('click', ()=>{
    if(!histTarget) return;
    window.location.href = '/download/historico_txt/' + encodeURIComponent(histTarget);
  });

  // Sidebar interactions (corrige #1: esconder "=" quando ativo)
  document.getElementById('openSidebar').addEventListener('click', ()=>{
    sidebar.classList.add('show');
    openSidebarBtn.style.display = 'none';
  });
  document.getElementById("btnLogout").addEventListener("click", function() {
    window.location.href = "/logout";
});
  document.getElementById('closeSidebar').addEventListener('click', ()=>{
    sidebar.classList.remove('show');
    openSidebarBtn.style.display = '';
  });

  // build list of blocos dynamically (numbers)
  const blocos = [...new Set(impressoras.map(p => (p.bloco||'').toString().trim()).filter(x=>x))].sort((a,b)=> (parseInt(a)||0)-(parseInt(b)||0));
  const listaBlocos = document.getElementById('listaBlocos');
  listaBlocos.innerHTML = blocos.map(b => `<button class="side-item" data-b="${b}">Bloco ${b}</button>`).join('') + `<button class="side-item" data-b="*">Todas</button>`;
  document.getElementById('btnBlocos').addEventListener('click', ()=> listaBlocos.classList.toggle('show'));
  listaBlocos.addEventListener('click', (ev)=>{
    const btn = ev.target.closest('.side-item');
    if(!btn) return;
    blocoFiltro = btn.dataset.b || '*';   // mantém regra combinada (#3)
    alertaFiltro = false;                 // se escolher bloco após alertas, mantém filtro? você pediu manter regra do botão selecionado; o botão aqui é online/offline, então preservado; alertas é um atalho separado
    applyFilters();
    sidebar.classList.remove('show');
    openSidebarBtn.style.display = '';
  });

  // alertas: ativa modo de alerta dedicado (#2) + mantém filtros combinados
  document.getElementById('btnAlertas').addEventListener('click', async ()=>{
    alertaFiltro = true;
    blocoFiltro = blocoFiltro || '*';
    applyFilters();
    sidebar.classList.remove('show');
    openSidebarBtn.style.display = '';
  });

  // logout demo
  document.getElementById('btnLogout').addEventListener('click', ()=> alert('Logout demo (nenhuma ação).'));

  // user dropdown e config modal (corrige #5: botões só aparecem ao clicar)
  const btnUser = document.getElementById('btnUser'), userDrop = document.getElementById('userDrop');
  btnUser.addEventListener('click', (e)=>{ e.stopPropagation(); userDrop.classList.toggle('show'); });
  document.addEventListener('click', (e)=> { if(!userDrop.contains(e.target) && !btnUser.contains(e.target)) userDrop.classList.remove('show'); });

  // configs modal
  const cfgBack = document.getElementById('cfgBack');
  document.getElementById('openSettings').addEventListener('click', ()=>{ userDrop.classList.remove('show'); montarTabelaCfg(); cfgBack.style.display = 'flex'; });
  document.getElementById('closeCfg').addEventListener('click', ()=> cfgBack.style.display = 'none');

  function montarTabelaCfg(){
    const tbody = document.querySelector('#tblCfg tbody');
    tbody.innerHTML = impressoras.map(p => `
      <tr>
        <td>${p.nome}</td>
        <td>${p.ip||''}</td>
        <td>${p.bloco||''}</td>
        <td>${p.setor||''}</td>
        <td>${p.selb||''}</td>
        <td style="display:flex; gap:6px">
          <button class="btn btn-red" onclick="excluirImpressora('${encodeURIComponent(p.nome)}')">Excluir</button>
        </td>
      </tr>`).join('');
  }


  window.excluirImpressora = async function(nomeEnc){
    const nome = decodeURIComponent(nomeEnc);
    if(!confirm('Excluir "'+nome+'"?')) return;
    showLoading('Excluindo impressora...');
    try{
      const r = await fetch('/delete_printer', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name:nome})});
      const j = await r.json();
      if(j.ok){
        const idx = impressoras.findIndex(x => x.nome === nome);
        if(idx>=0) impressoras.splice(idx,1);
        delete statusAtual[nome];
        montarTabelaCfg(); renderGrid(); updateKpis(); applyFilters();
        alert('Excluída');
      }else alert('Falha ao excluir');
    }catch(e){
      alert('Erro ao excluir'); console.error(e);
    }finally{
      hideLoading();
    }
  };

  // add new printer from config (com animação #6)
  document.getElementById('btnAdd').addEventListener('click', async ()=>{
    const nome = document.getElementById('addNome').value.trim();
    const ip = document.getElementById('addIP').value.trim();
    const bloco = document.getElementById('addBloco').value.trim();
    const setor = document.getElementById('addSetor').value.trim();
    const selb = document.getElementById('addSelb').value.trim();
    if(!nome || !ip){ alert('Preencha nome e IP'); return; }
    showLoading('Adicionando impressora...');
    try{
      const r = await fetch('/add_printer', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name:nome, ip, bloco, setor, selb})});
      const j = await r.json();
      if(j.ok){
        impressoras.push({nome, ip, bloco, setor, selb});
        montarTabelaCfg(); renderGrid(); updateKpis(); applyFilters();
        alert('Adicionada');
      }else alert('Falha');
    }catch(e){ alert('Erro ao adicionar'); console.error(e); }
    finally{ hideLoading(); }
  });

  // coleta nomes visíveis na grade (para o relatório #7)
  function getVisiblePrinterNames(){
    const arr = [];
    document.querySelectorAll('.card').forEach(c=>{
      if(c.style.display !== 'none'){
        arr.push(c.dataset.nome);
      }
    });
    return arr;
  }

  // download report button (header) – agora respeita filtros e mostra animação (#7)
  document.getElementById('btnDownloadReport').addEventListener('click', async ()=>{
    showLoading('Gerando Relatório...');
    try{
      const nomes = getVisiblePrinterNames();
      const res = await fetch('/download/relatorio', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({nomes})
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'relatorio_impressoras.xlsx'; document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }catch(e){ alert('Falha ao gerar relatório'); console.error(e); }
    finally{ hideLoading(); }
  });

  // dark mode (borda verde + troca ícone #8)
  document.getElementById('btnDark').addEventListener('click', ()=>{
    document.documentElement.classList.toggle('dark');
    // atualiza ícones exibidos
    document.querySelectorAll('img.zebra').forEach(img => { img.src = iconSrc(); });
  });

  // socket updates
  socket.on('atualizar_status', (data)=>{
    // data: {nome: {status,aviso}, ...}
    Object.keys(data).forEach(k => { statusAtual[k] = data[k]; });

    // regra: impedir Online com aviso "SEM CONEXÃO"
    Object.keys(statusAtual).forEach(n => {
      if(statusAtual[n].status === 'Online' && (statusAtual[n].aviso === 'SEM CONEXÃO' || !statusAtual[n].aviso)) {
        statusAtual[n].aviso = 'OPERANDO';
      }
    });

    // atualiza cards
    document.querySelectorAll('.card').forEach(c=>{
      const n = c.dataset.nome;
      const s = statusAtual[n];
      if(!s) return;
      const onoff = c.querySelector('.onoff');
      onoff.textContent = s.status;
      onoff.className = 'onoff ' + (s.status === 'Online' ? 'on' : 'off');
      const avisoEl = c.querySelector('.aviso');
      avisoEl.textContent = s.aviso || '';
      // aviso color: OPERANDO verde, outros em vermelho
      avisoEl.style.color = (s.aviso && s.aviso.toUpperCase() === 'OPERANDO') ? 'var(--green)' : 'var(--red)';
    });

    updateKpis();
    tsElem.textContent = new Date().toLocaleTimeString();

    // hide grid-loading on first update
    if(gridLoading) gridLoading.style.display = 'none';
    applyFilters();
  });

  // fallback fetch status once if socket slow
  setTimeout(async ()=>{
    if(Object.keys(statusAtual).length === 0){
      try{
        const r = await fetch('/status'); const st = await r.json();
        Object.assign(statusAtual, st);
        socket.emit('ack');
        Object.keys(statusAtual).forEach(n => {
          if(statusAtual[n].status === 'Online' && (statusAtual[n].aviso === 'SEM CONEXÃO' || !statusAtual[n].aviso)) {
            statusAtual[n].aviso = 'OPERANDO';
          }
        });
        renderGrid();
        document.querySelectorAll('.card').forEach(c=>{
          const n = c.dataset.nome;
          const s = statusAtual[n];
          if(!s) return;
          const onoff = c.querySelector('.onoff'); onoff.textContent = s.status; onoff.className = 'onoff ' + (s.status === 'Online' ? 'on' : 'off');
          const avisoEl = c.querySelector('.aviso'); avisoEl.textContent = s.aviso || ''; avisoEl.style.color = (s.aviso && s.aviso.toUpperCase() === 'OPERANDO') ? 'var(--green)' : 'var(--red)';
        });
        updateKpis();
        
         const contadorEl = c.querySelector('.contador-val');
  if(contadorEl){
      contadorEl.textContent = s.contador || '--';
  }
        
      }catch(e){ console.warn('fallback status failed', e); }
      finally{ if(gridLoading) gridLoading.style.display = 'none'; }
    }
  }, 2200);

  // initial render
  renderGrid();
  updateKpis();

  document.addEventListener('DOMContentLoaded', () => {
  showLoading('Carregando impressoras...');

  // Renderiza impressoras iniciais
  renderImpressoras(impressoras);

  // Depois de renderizar, esconde loading
  hideLoading();
});

socket.on('connect', () => {
  showLoading('Carregando impressoras...');
});

socket.on('atualizar_status', (data) => {
  statusAtual = data;
  updateKpisAndGrid(); // função que você já usa para atualizar cards
  hideLoading();
});

</script>
</body>
</html>
